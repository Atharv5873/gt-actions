# Test: compilation_error (TypeScript)
name: "Test - TypeScript Compilation Error"

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/test-compilation-ts.yml'

jobs:
  ts-compilation:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TypeScript
        run: npm install -g typescript

      - name: Create broken TypeScript file
        run: |
          cat > broken.ts << 'EOF'
          const message: string = 42;
          const result: number = "hello" + true;
          
          interface User {
            name: string;
            age: number;
          }
          
          const user: User = { name: 123, age: "old" };
          EOF

      - name: Compile TypeScript (will fail)
        run: tsc broken.ts --strict
