# Test: database_error (connection refused)
# Failure type: database_error
# Scenario: Application startup health-check tries to connect to a PostgreSQL
#            database that was never started — realistic microservice CI break.
name: "GT - Database Connection Error"

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/test-database-connection-error.yml'

jobs:
  db-connection:
    runs-on: ubuntu-latest
    # Intentionally NO postgres service — simulates missing infra config
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install psycopg2
        run: pip install psycopg2-binary sqlalchemy

      - name: Run application startup (will fail — no DB running)
        run: |
          python << 'EOF'
          import sqlalchemy as sa

          DB_URL = "postgresql://appuser:apppass@localhost:5432/appdb"
          engine = sa.create_engine(DB_URL, connect_args={"connect_timeout": 3})

          print("Checking database connectivity...")
          try:
              with engine.connect() as conn:
                  result = conn.execute(sa.text("SELECT 1"))
                  print("Database connection OK")
          except Exception as e:
              print(f"FATAL: Database connection failed: {e}")
              print("OperationalError: could not connect to server: Connection refused")
              print("  Is the server running on host 'localhost' and accepting TCP/IP connections on port 5432?")
              raise SystemExit(1)
          EOF

      - name: Run database health check
        run: |
          python -c "
          import psycopg2
          conn = psycopg2.connect(
              host='localhost', port=5432,
              dbname='appdb', user='appuser', password='apppass',
              connect_timeout=3
          )
          print('Connected!')
          conn.close()
          "
