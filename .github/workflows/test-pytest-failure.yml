# Test: test_failure (pytest)
name: "Test - Pytest Failure"

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/test-pytest-failure.yml'

jobs:
  pytest-failure:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Create failing tests
        run: |
          mkdir -p tests
          cat > tests/test_demo.py << 'EOF'
          def test_addition():
              assert 1 + 1 == 3, "Math is broken"

          def test_string():
              assert "hello" == "world", "Strings don't match"

          def test_passing():
              assert True
          EOF

      - name: Run pytest
        run: pytest tests/ -v
