# Test: config_error (multiple missing secrets in deployment pipeline)
# Failure type: config_error
# Scenario: A realistic Kubernetes deployment script that requires 5 secrets.
#            None are configured → deployment fails with multiple KeyError/undefined
#            variable errors across different deployment stages.
name: "GT - Missing Secrets Deployment Failure"

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/test-missing-secret-deployment.yml'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate deployment configuration
        run: |
          python3 << 'EOF'
          import os, sys

          REQUIRED_SECRETS = [
              "KUBE_CONFIG_BASE64",
              "AWS_ACCESS_KEY_ID",
              "AWS_SECRET_ACCESS_KEY",
              "DOCKER_REGISTRY_TOKEN",
              "STAGING_DB_CONNECTION_STRING",
          ]

          print("Validating deployment secrets...")
          missing = []
          for secret in REQUIRED_SECRETS:
              value = os.environ.get(secret)
              if not value:
                  missing.append(secret)
                  print(f"  ERROR: {secret} is not set")
              else:
                  print(f"  OK: {secret} configured")

          if missing:
              print(f"\nDeployment aborted: {len(missing)} required secret(s) missing:")
              for s in missing:
                  print(f"  - {s}")
              sys.exit(1)
          EOF

      - name: Configure kubectl
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_BASE64 }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "Error: KUBE_CONFIG_BASE64 secret not configured"
            echo "kubectl: cannot connect to cluster — kubeconfig not set"
            exit 1
          fi
          echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config

      - name: Login to AWS ECR
        env:
          AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          if [ -z "$AWS_KEY" ] || [ -z "$AWS_SECRET" ]; then
            echo "AuthError: AWS credentials not configured"
            echo "An error occurred (AuthFailure): AWS was not able to validate the provided access credentials"
            exit 1
          fi
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin 123456789.dkr.ecr.us-east-1.amazonaws.com

      - name: Deploy to Kubernetes
        run: |
          python3 << 'EOF'
          import os, sys

          db_conn = os.environ.get("STAGING_DB_CONNECTION_STRING")
          if not db_conn:
              raise KeyError("STAGING_DB_CONNECTION_STRING")
          print(f"Deploying with DB: {db_conn[:20]}...")
          EOF
