# Test: build_error + downstream job failure (multi-job dependency)
# Failure type: build_error
# Scenario: A 3-job pipeline: build → test → deploy.
#            The build job fails (compilation error), causing test and deploy
#            to be skipped/failed.  Mirrors real pipeline cascade failures.
name: "GT - Multi-Job Pipeline Cascade Failure"

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/test-multi-job-dependency-failure.yml'

jobs:
  build:
    name: "Build Application"
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create application source
        run: |
          cat > app.py << 'EOF'
          # Broken Python: invalid syntax in production module
          class APIHandler
              def handle_request(self, request):
                  match request.method:
                      "GET" => return self.handle_get(request)
                      "POST" => return self.handle_post(request)
          EOF

      - name: Compile / syntax check (will fail)
        run: python -m py_compile app.py

      - name: Build distribution package
        run: |
          pip install build
          python -m build --wheel .

  test:
    name: "Run Test Suite"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        run: echo "Downloading artifact from build job..."

      - name: Run integration tests
        run: |
          pip install pytest
          pytest tests/ -v

  deploy:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - name: Deploy to staging environment
        run: |
          echo "Deploying to staging..."
          echo "DEPLOY_ENV=staging"
          echo "Deployment complete"
