# Test: test_failure (end-to-end / Playwright browser test failure)
# Failure type: test_failure
# Scenario: Playwright E2E tests against a locally started web app.
#            Tests fail because UI elements are missing, text doesn't match,
#            and a button click navigation lands on wrong page.
name: "GT - E2E Playwright Test Failure"

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/test-e2e-playwright-failure.yml'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python (for the test web server)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright and dependencies
        run: |
          mkdir -p e2eapp
          cd e2eapp
          npm init -y
          npm install --save-dev @playwright/test
          npx playwright install chromium --with-deps

      - name: Create test web server (broken UI)
        run: |
          # Server that returns HTML with wrong content — tests will fail
          python3 << 'PYEOF'
          import http.server, threading

          HTML = """<!DOCTYPE html>
          <html>
          <head><title>Wrong Title</title></head>
          <body>
            <h1>Welcome to OldApp v1.0</h1>
            <!-- Missing: the 'Get Started' button the test expects -->
            <!-- Missing: the login form the test expects -->
            <p>Under construction</p>
          </body>
          </html>"""

          class H(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.send_header("Content-Type", "text/html")
                  self.end_headers()
                  self.wfile.write(HTML.encode())
              def log_message(self, *a): pass

          s = http.server.HTTPServer(("127.0.0.1", 3000), H)
          t = threading.Thread(target=s.serve_forever)
          t.daemon = True
          t.start()
          import time; time.sleep(999)
          PYEOF &

          sleep 2
          echo "Test server started"

      - name: Create Playwright tests
        run: |
          mkdir -p e2eapp/tests
          cat > e2eapp/tests/homepage.spec.ts << 'EOF'
          import { test, expect } from '@playwright/test';

          test('homepage has correct title', async ({ page }) => {
            await page.goto('http://127.0.0.1:3000');
            await expect(page).toHaveTitle('MyApp — Dashboard');  // Wrong title
          });

          test('get started button is visible and clickable', async ({ page }) => {
            await page.goto('http://127.0.0.1:3000');
            const btn = page.getByRole('button', { name: 'Get Started' });
            await expect(btn).toBeVisible({ timeout: 3000 });  // Button doesn't exist
            await btn.click();
            await expect(page).toHaveURL(/.*dashboard/);
          });

          test('login form has email and password fields', async ({ page }) => {
            await page.goto('http://127.0.0.1:3000');
            await expect(page.getByLabel('Email')).toBeVisible();  // Missing
            await expect(page.getByLabel('Password')).toBeVisible();  // Missing
          });
          EOF

          cat > e2eapp/playwright.config.ts << 'EOF'
          import { defineConfig } from '@playwright/test';
          export default defineConfig({
            testDir: './tests',
            timeout: 10000,
            retries: 0,
            use: { headless: true },
          });
          EOF

      - name: Run E2E tests (will fail)
        run: cd e2eapp && npx playwright test --reporter=list
