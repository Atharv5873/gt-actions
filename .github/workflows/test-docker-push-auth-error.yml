# Test: auth_error (Docker registry authentication failure)
# Failure type: auth_error
# Scenario: CI pipeline builds a Docker image then tries to push to Docker Hub
#            using invalid credentials — authentication fails at the push step.
name: "GT - Docker Registry Auth Error"

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/test-docker-push-auth-error.yml'

jobs:
  docker-push:
    runs-on: ubuntu-latest
    steps:
      - name: Create minimal Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM alpine:3.18
          RUN echo "hello from CI"
          EOF

      - name: Build Docker image
        run: docker build -t myapp:latest .

      - name: Login to Docker Hub with invalid credentials
        run: |
          echo "invalid_docker_password_xyz" | docker login -u "nonexistent_user_12345" --password-stdin
          echo "Login succeeded"

      - name: Push image (will fail due to auth error above)
        run: docker push nonexistent_user_12345/myapp:latest
